<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base-path" content="">
    <title>Redirect – Prompt Anatomy</title>
    <script>
        (function() {
            var base = document.querySelector('meta[name="base-path"]');
            base = base ? (base.getAttribute('content') || '') : '';
            if (base && base.slice(-1) === '/') base = base.slice(0, -1);
            if (base === '' && location.pathname && location.pathname !== '/') {
                base = location.pathname.replace(/\/index\.html?$/i, '').replace(/\/?$/, '') || '';
            }
            var lang = 'en';
            try {
                var stored = localStorage.getItem('lang');
                if (stored === 'lt' || stored === 'en' || stored === 'et' || stored === 'lv') lang = stored;
                else if (typeof navigator !== 'undefined' && navigator.language) {
                    var nav = navigator.language.toLowerCase();
                    if (nav.indexOf('lt') === 0) lang = 'lt';
                    else if (nav.indexOf('et') === 0 || nav.indexOf('ee') === 0) lang = 'et';
                    else if (nav.indexOf('lv') === 0) lang = 'lv';
                }
            } catch (e) {}
            var path = (base ? base + '/' : '/') + lang + '/';
            window.location.replace(path);
        })();
    </script>
</head>
<body>
    <p>Redirecting… <a href="lt/" onclick="try{localStorage.setItem('lang','lt')}catch(e){}">Lietuvių</a> | <a href="en/" onclick="try{localStorage.setItem('lang','en')}catch(e){}">English</a> | <a href="et/" onclick="try{localStorage.setItem('lang','et')}catch(e){}">Eesti</a> | <a href="lv/" onclick="try{localStorage.setItem('lang','lv')}catch(e){}">Latviešu</a></p>
</body>
</html>
