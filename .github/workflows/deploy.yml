# GitHub Pages deploy – statinė DI Promptų Biblioteka
# Prieš pirmą sėkmingą paleidimą: Settings → Pages → Build and deployment: GitHub Actions
# (be to deploy job grąžina 404 „Failed to create deployment“ – žr. DEPLOYMENT.md)
# Nuoroda: https://github.com/DITreneris/spinoff01 (QA standartas)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
      - run: npm install
      - name: Verify ET/LV/LT generated output committed
        run: |
          npm run generate:et-lv
          git diff --exit-code -- et/index.html lv/index.html js/library.et.js js/library.lv.js js/library.lt.js
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # v4 neįtraukia dotfailų (.nojekyll); v3.0.1 paliekame, kad GitHub Pages nebandytų Jekyll
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
