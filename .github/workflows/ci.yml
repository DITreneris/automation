name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Verify ET/LV/LT library JS match generator (en source)
        run: |
          npm run generate:et-lv
          git diff --exit-code -- et/index.html lv/index.html js/library.et.js js/library.lv.js js/library.lt.js || {
            echo "::error::Run npm run generate:et-lv locally and commit et/index.html, lv/index.html, js/library.et.js, js/library.lv.js, js/library.lt.js."
            exit 1
          }

      - name: Run tests (structure + lint)
        run: npm test

      - name: Accessibility check (pa11y)
        run: |
          npx serve -s . -l 3000 &
          npx wait-on -t 60000 http://127.0.0.1:3000/
          node scripts/pa11y-pages.cjs
        env:
          CI: true
          PA11Y_BASE: http://127.0.0.1:3000
